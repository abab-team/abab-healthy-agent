services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: family-health-backend
    env_file:
      - .env.example
    environment:
      ENV: development
      DEBUG: "true"
      DATABASE_URL: postgresql+psycopg://family_health:family_health@postgres:5432/family_health
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT: http://minio:9000
      LOCAL_STORAGE_DIR: /app/storage/local
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: family-health-postgres
    environment:
      POSTGRES_DB: family_health
      POSTGRES_USER: family_health
      POSTGRES_PASSWORD: family_health
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U family_health -d family_health"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: family-health-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: family-health-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

volumes:
  postgres_data:
  redis_data:
  minio_data:
